name: Weekly Advisor Digest

on:
  schedule:
    - cron: '30 19 * * 3'   # Every Wednesday at 11:10 AM ET / 10:10 AM CT
  workflow_dispatch:         # Also allows manual "Run workflow" from GitHub Actions UI

jobs:
  digest:
    name: Collect, Summarize & Email
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        run: python advisor_digest.py
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          APIFY_API_TOKEN:   ${{ secrets.APIFY_API_TOKEN }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          # Optional overrides (defaults are gmail):
          # SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          # SMTP_PORT:       ${{ secrets.SMTP_PORT }}
